# Tema "Fintech terang" (gaya Bibit) — latar terang, aksen hijau segar.
[theme]
base = "light"
primaryColor = "#16c784"
backgroundColor = "#f5f7f9"
secondaryBackgroundColor = "#ffffff"
textColor = "#0f172a"
font = "Inter, sans-serif"
headingFont = "Inter, sans-serif"
baseRadius = "0.9rem"
borderColor = "#e9edf2"

[browser]
gatherUsageStats = false

[server]
headless = true
runOnSave = true
