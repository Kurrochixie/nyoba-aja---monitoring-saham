<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Saham Monitor — Pemantau Saham Indonesia</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="app/styles.css?v=21" />
</head>
<body>
  <div id="root"><div style="height:100vh;display:flex;align-items:center;justify-content:center;gap:12px;font-family:'Plus Jakarta Sans',system-ui,sans-serif;color:#52617a;font-weight:600"><div style="width:22px;height:22px;border:3px solid #e6f9f1;border-top-color:#16c784;border-radius:50%;animation:spin .8s linear infinite"></div>Memuat data pasar…</div></div>
  <style>@keyframes spin{to{transform:rotate(360deg)}}</style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script src="app/data.js?v=21"></script>
  <script src="app/live.js?v=21"></script>

  <script type="text/babel" src="app/icons.jsx?v=21"></script>
  <script type="text/babel" src="app/charts.jsx?v=21"></script>
  <script type="text/babel" src="app/components.jsx?v=21"></script>
  <script type="text/babel" src="app/tweaks-panel.jsx?v=21"></script>
  <script type="text/babel" src="app/screen-dashboard.jsx?v=21"></script>
  <script type="text/babel" src="app/screen-riset.jsx?v=21"></script>
  <script type="text/babel" src="app/screen-portofolio.jsx?v=21"></script>
  <script type="text/babel" src="app/screen-misc.jsx?v=21"></script>
  <script type="text/babel" src="app/screen-styleguide.jsx?v=21"></script>
  <script type="text/babel" src="app/app.jsx?v=21"></script>

  <!-- Render mock dulu (instan), lalu tarik data IHSG live dari /api/bootstrap
       dan timpa window.SM secara in-place (jaga referensi getStock), re-render. -->
  <script type="text/babel" data-presets="env,react">
    (function () {
      var root = ReactDOM.createRoot(document.getElementById("root"));
      var done = false;
      function go() { if (done) return; done = true; root.render(React.createElement(window.SahamApp)); }
      fetch("/api/bootstrap")
        .then(function (r) { if (!r.ok) throw new Error("bad"); return r.json(); })
        .then(function (d) { if (window.SM_merge) window.SM_merge(d); go(); })
        .catch(function () { go(); });
      setTimeout(go, 9000);  // fallback: render dgn data mock bila API lambat
    })();
  </script>
</body>
</html>
